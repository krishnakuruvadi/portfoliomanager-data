name: Run Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        if [ -f new_requirements.txt ]; then pip install -r new_requirements.txt; fi

    - name: Run India tests
      run: |
        cd India/code/test
        python -m unittest discover -s . -p "test_*.py" -v

    - name: Run verify file content test
      run: |
        cd India/code/test
        python -m unittest test_verify_file_content -v

    - name: Verify all project files
      run: |
        python India/code/helpers/verify_file_content.py

    - name: Run main code tests
      run: |
        cd code
        python -m unittest discover -s . -p "test_*.py" -v 2>/dev/null || echo "No tests found in main code directory"
